<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The American Sign Language Knowledge Graph</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    :root {
      --bg: #f2efe8;
      --ink: #111111;
      --muted: #666666;
      --line: rgba(17, 17, 17, 0.12);
      --soft: rgba(17, 17, 17, 0.05);
      --panel: rgba(255, 255, 255, 0.9);
      --panel-strong: rgba(255, 255, 255, 0.96);
      --shadow: 0 18px 60px rgba(17, 17, 17, 0.09);
      --radius: 20px;
      --signal: #1450ff;
      --sign: #111111;
      --phonological: #2563ff;
      --semantic: #f06d3f;
      --syntactic: #10937d;
      --systematicity: #bd8d08;
      --cognitive: #7d5dff;
      --other: #8a8a8a;
      --danger: #c35a31;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      color: var(--ink);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 300;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0) 26%),
        linear-gradient(180deg, #f8f6f1 0%, var(--bg) 100%);
    }

    button,
    input,
    select {
      font: inherit;
      color: inherit;
    }

    .viewport {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #graph {
      width: 100%;
      height: 100%;
      display: block;
      background:
        linear-gradient(transparent 96%, rgba(17, 17, 17, 0.03) 100%),
        linear-gradient(90deg, transparent 96%, rgba(17, 17, 17, 0.03) 100%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.5));
      background-size: 40px 40px, 40px 40px, auto;
    }

    .panel {
      position: absolute;
      top: 16px;
      left: 16px;
      bottom: 16px;
      width: min(380px, calc(100vw - 32px));
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 10;
    }

    .top-card {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--panel);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    .panel-header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--line);
      display: grid;
      gap: 4px;
      background: rgba(255, 255, 255, 0.52);
    }

    .eyebrow,
    .tab,
    .chip,
    .pill,
    .micro,
    .label {
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .eyebrow {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
    }

    .title {
      margin: 0;
      font-size: 24px;
      line-height: 1;
      font-weight: 700;
    }

    .selection-card {
      padding: 14px 16px 12px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--panel);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      display: grid;
      gap: 12px;
      overflow-y: auto;
      max-height: min(52vh, 440px);
      flex-shrink: 0;
    }

    .selection-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .selection-name {
      margin: 0;
      padding-top: 6px;
      font-size: 26px;
      line-height: 0.95;
      font-weight: 700;
    }

    .selection-id {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }

    .pill-row,
    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .path-inline {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .path-inline input {
      flex: 1;
      min-width: 0;
    }

    .path-arrow {
      color: var(--muted);
      font-size: 16px;
      flex-shrink: 0;
      user-select: none;
    }

    .path-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      min-height: 0;
    }

    .path-pills:empty,
    .path-pills > div:empty {
      display: none;
    }

    .pill,
    .chip {
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      font-size: 10px;
      font-weight: 700;
    }

    .chip {
      cursor: pointer;
    }

    .chip.active,
    .pill.active {
      background: var(--ink);
      border-color: var(--ink);
      color: #ffffff;
    }

    .swatch {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      margin-right: 6px;
      vertical-align: middle;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .summary-card {
      padding: 10px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.78);
    }

    .summary-card strong {
      display: block;
      font-size: 18px;
      line-height: 1;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .summary-card span {
      display: block;
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .control-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .top-card-controls {
      padding: 10px 16px 12px;
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.52);
      flex-shrink: 0;
    }

    .button,
    .ghost {
      padding: 9px 11px;
      border-radius: 999px;
      border: 1px solid var(--ink);
      background: var(--ink);
      color: #ffffff;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }

    .ghost {
      background: rgba(255, 255, 255, 0.88);
      border-color: var(--line);
      color: var(--ink);
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
    }

    .tab {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.88);
      font-size: 10px;
      font-weight: 700;
      cursor: pointer;
    }

    .tab.active {
      background: var(--ink);
      color: #ffffff;
      border-color: var(--ink);
    }

    .tab-panels {
      position: relative;
      flex: 1;
      min-height: 0;
    }

    .tab-panel {
      position: absolute;
      inset: 0;
      padding: 14px 16px 18px;
      display: none;
      overflow: auto;
    }

    .tab-panel.active {
      display: block;
    }

    .section {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .label {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
    }

    .field {
      display: grid;
      gap: 6px;
    }

    input[type="search"],
    input[type="text"] {
      width: 100%;
      padding: 10px 11px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.95);
      outline: none;
    }

    input:focus {
      border-color: rgba(20, 80, 255, 0.38);
      box-shadow: 0 0 0 3px rgba(20, 80, 255, 0.1);
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .list,
    .table-wrap,
    .bar-wrap {
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.78);
      overflow: auto;
    }

    .list {
      max-height: 280px;
    }

    .list-row {
      width: 100%;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: transparent;
      padding: 11px 12px;
      text-align: left;
      display: grid;
      gap: 4px;
      cursor: pointer;
    }

    .list-row:last-child {
      border-bottom: 0;
    }

    .list-row:hover {
      background: rgba(17, 17, 17, 0.04);
    }

    .row-title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.2;
    }

    .row-meta {
      font-size: 12px;
      color: var(--muted);
    }

    .micro {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
    }

    .clause-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .clause-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .clause-pill button {
      border: 0;
      background: transparent;
      padding: 0;
      cursor: pointer;
      font: inherit;
      color: inherit;
    }

    .checkbox-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
    }

    .checkbox {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .checkbox input {
      margin: 0;
      accent-color: var(--ink);
    }

    .bar-list {
      display: grid;
      gap: 8px;
      padding: 10px;
    }

    .bar-row {
      display: grid;
      gap: 4px;
    }

    .bar-meta {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
    }

    .track {
      height: 7px;
      border-radius: 999px;
      background: rgba(17, 17, 17, 0.08);
      overflow: hidden;
    }

    .fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #111111 0%, #727272 100%);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    th,
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      position: sticky;
      top: 0;
      background: rgba(255, 255, 255, 0.98);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .range-box {
      display: grid;
      gap: 8px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--ink);
    }

    .range-value {
      font-size: 12px;
      color: var(--muted);
    }

    .status {
      position: absolute;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      z-index: 8;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.9);
      box-shadow: var(--shadow);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: calc(100vw - 32px);
    }

    .tooltip {
      position: absolute;
      z-index: 14;
      pointer-events: none;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(17, 17, 17, 0.96);
      color: #ffffff;
      font-size: 12px;
      line-height: 1.45;
      opacity: 0;
      max-width: 300px;
    }

    .guide-label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      fill: rgba(17, 17, 17, 0.34);
      pointer-events: none;
    }

    .similarity-sliders {
      display: grid;
      gap: 6px;
      padding: 2px 0 4px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .slider-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      min-width: 90px;
    }

    .phon-label { color: var(--phonological); }
    .sem-label { color: var(--semantic); }

    .similarity-slider {
      flex: 1;
      height: 4px;
      cursor: pointer;
    }

    .phon-slider { accent-color: var(--phonological); }
    .sem-slider { accent-color: var(--semantic); }

    .slider-value {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      min-width: 18px;
      text-align: right;
    }

    .node-tabs {
      display: flex;
      gap: 6px;
    }

    .node-tab {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.88);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
    }

    .node-tab.active {
      background: var(--ink);
      color: #ffffff;
      border-color: var(--ink);
    }

    .node-tab-content {
      display: none;
    }

    .node-tab-content.active {
      display: block;
    }

    .fact-type-select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.95);
      outline: none;
      cursor: pointer;
      appearance: none;
    }

    .fact-type-select:focus {
      border-color: rgba(20, 80, 255, 0.38);
      box-shadow: 0 0 0 3px rgba(20, 80, 255, 0.1);
    }

    .node-facts-list {
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.78);
      overflow-y: auto;
      max-height: 148px;
    }

    .related-list-pane {
      overflow-y: auto;
      max-height: 148px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.78);
    }

    .node-fact-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      padding: 7px 10px;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
    }

    .node-fact-row:last-child {
      border-bottom: 0;
    }

    .node-fact-relation {
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex-shrink: 0;
      max-width: 48%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .node-fact-value {
      text-align: right;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    @media (max-width: 880px) {
      .panel {
        width: calc(100vw - 24px);
        left: 12px;
        right: 12px;
        top: auto;
        bottom: 12px;
      }

      .top-card {
        max-height: min(58vh, 640px);
      }

      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="viewport">
    <svg id="graph" aria-label="The American Sign Language Knowledge Graph"></svg>

    <aside class="panel">
      <div class="top-card">
      <header class="panel-header">
        <h1 class="title">The American Sign Language Knowledge Graph</h1>
      </header>

      <nav class="tabs">
        <button class="tab active" data-tab="search">Search</button>
        <button class="tab" data-tab="filters">Filters</button>
        <button class="tab" data-tab="paths">Paths</button>
        <button class="tab" data-tab="overview">Overview</button>
      </nav>

      <div class="tab-panels">
        <section class="tab-panel active" data-panel="search">
          <div class="section">
            <input id="searchInput" type="search" placeholder="Search signs…" autocomplete="off">
            <div id="searchList" class="list">
              <div class="micro" style="padding:12px;">Type to search signs.</div>
            </div>
          </div>
        </section>

        <section class="tab-panel" data-panel="filters">
          <div class="section">
            <div class="section-head">
              <span>Fact Types</span>
              <span id="factTypeMeta"></span>
            </div>
            <div class="control-row">
              <button id="factTypesShowAll" class="ghost" type="button">Show All</button>
              <button id="factTypesClear" class="ghost" type="button">Clear</button>
            </div>
            <div id="factTypeChips" class="chip-row"></div>
          </div>

          <div class="section">
            <div class="section-head">
              <span>Fact Clauses</span>
              <span id="clauseMeta"></span>
            </div>
            <div class="field">
              <label class="label" for="relationInput">Relation</label>
              <input id="relationInput" type="text" list="relationOptions" placeholder="Major_Location, Handshape, M-plant">
              <datalist id="relationOptions"></datalist>
            </div>
            <div class="field">
              <label class="label" for="valueInput">Value</label>
              <input id="valueInput" type="text" placeholder="Neutral, 5, 1.0">
            </div>
            <div class="button-grid">
              <button id="addClauseButton" class="button" type="button">Add Clause</button>
              <button id="clearClausesButton" class="ghost" type="button">Clear</button>
            </div>
            <div id="clauseList" class="clause-list"></div>
          </div>

          <div class="section">
            <div class="section-head">
              <span>Scope</span>
              <span id="scopeMeta"></span>
            </div>
            <div class="range-box">
              <label class="label" for="signLimitInput">Sign Limit</label>
              <input id="signLimitInput" type="range" min="20" max="120" step="10" value="50">
              <div id="signLimitValue" class="range-value"></div>
            </div>
            <div class="range-box">
              <label class="label" for="factLimitInput">Fact Limit</label>
              <input id="factLimitInput" type="range" min="30" max="220" step="10" value="120">
              <div id="factLimitValue" class="range-value"></div>
            </div>
          </div>

          <div class="section">
            <div class="button-grid">
              <button id="loadButton" class="button" type="button">Load Local TSV</button>
              <button id="resetFiltersButton" class="ghost" type="button">Reset</button>
            </div>
            <input id="fileInput" style="display:none;" type="file" accept=".tsv,text/tab-separated-values" multiple>
          </div>
        </section>

        <section class="tab-panel" data-panel="paths">
          <div class="section">
            <div class="path-inline">
              <input id="pathStartInput" type="search" placeholder="from…" autocomplete="off">
              <span class="path-arrow">→</span>
              <input id="pathTargetInput" type="search" placeholder="to…" autocomplete="off">
            </div>
            <div class="path-pills">
              <div id="pathStartPill" class="pill-row"></div>
              <div id="pathEndPill" class="pill-row"></div>
            </div>
            <div class="button-grid">
              <button id="pathButton" class="button" type="button">Find Path</button>
              <button id="clearPathButton" class="ghost" type="button">Clear</button>
            </div>
          </div>

          <div class="section">
            <div class="section-head">
              <span>Path</span>
              <span id="pathMeta"></span>
            </div>
            <div id="pathList" class="list">
              <div class="micro" style="padding:12px;">Select a start sign and enter an end sign.</div>
            </div>
          </div>
        </section>

        <section class="tab-panel" data-panel="overview">
          <div class="section">
            <div id="overviewStats" class="summary-grid" style="grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;"></div>
          </div>
          <div class="section">
            <div class="section-head"><span>Similarity Weights</span></div>
            <div class="micro" style="padding:0 0 6px;opacity:0.6;">Controls related signs, path traversal, and force edge strength.</div>
            <div id="overviewSimilaritySliders" class="similarity-sliders"></div>
          </div>
        </section>

      </div>

      <div class="control-row top-card-controls">
        <button id="modeBreadth" class="ghost" type="button">Breadth</button>
        <button id="modeFocus" class="ghost" type="button">Focus</button>
        <button id="layoutGrouped" class="ghost" type="button">Grouped</button>
        <button id="layoutForce" class="ghost" type="button">Force</button>
        <button id="fitButton" class="ghost" type="button">Fit</button>
        <button id="freezeButton" class="ghost" type="button">Freeze</button>
      </div>
      </div><!-- .top-card -->

      <section class="selection-card">
        <div class="selection-head">
          <div>
            <h2 id="selectionName" class="selection-name">Overview</h2>
          </div>
          <div>
            <button id="closeNodeButton" class="ghost" type="button" style="display:none;padding:5px 10px;line-height:1;">×</button>
          </div>
        </div>

        <div id="selectionPills"></div>

        <div id="selectionSummary" class="summary-grid"></div>

        <div class="node-tabs" id="nodeTabs" style="display:none;">
          <button class="node-tab active" data-node-tab="facts">Facts</button>
          <button class="node-tab" data-node-tab="related">Related</button>
        </div>

        <div id="nodeFactsPane" class="node-tab-content active"></div>

        <div id="nodeRelatedPane" class="node-tab-content"></div>

      </section>
    </aside>

    <div id="status" class="status">Loading `nodes.tsv` and `edges_node.tsv`.</div>
    <div id="tooltip" class="tooltip"></div>
  </div>

  <script>
    const COLORS = {
      sign: css('--sign'),
      phonological: css('--phonological'),
      semantic: css('--semantic'),
      syntactic: css('--syntactic'),
      systematicity: css('--systematicity'),
      cognitive: css('--cognitive'),
      other: css('--other')
    };

    async function tryAutoLoad() {
      try {
        const [nodesResponse, edgesResponse] = await Promise.all([
          fetch('./nodes.tsv'),
          fetch('./edges_node.tsv')
        ]);
        if (!nodesResponse.ok || !edgesResponse.ok) {
          throw new Error('fetch failed');
        }
        const [nodesText, edgesText] = await Promise.all([nodesResponse.text(), edgesResponse.text()]);
        await loadDataset(nodesText, edgesText);
      } catch (error) {
        setStatus('Automatic loading was blocked. Load the TSV files manually or serve the folder with `python3 -m http.server`.', true);
      }
    }

    async function manualLoad(event) {
      const files = Array.from(event.target.files || []);
      const nodesFile = files.find((file) => file.name === 'nodes.tsv') || files.find((file) => file.name.toLowerCase().includes('nodes'));
      const edgesFile = files.find((file) => file.name === 'edges_node.tsv') || files.find((file) => file.name.toLowerCase().includes('edges_node'));
      if (!nodesFile || !edgesFile) {
        setStatus('Select both `nodes.tsv` and `edges_node.tsv`.', true);
        return;
      }
      const [nodesText, edgesText] = await Promise.all([nodesFile.text(), edgesFile.text()]);
      await loadDataset(nodesText, edgesText);
    }

    async function loadDataset(nodesText, edgesText) {
      setStatus('Parsing nodes.tsv...');
      await nextFrame();
      const nodeRows = parseTSV(nodesText);
      setStatus('Parsing edges_node.tsv...');
      await nextFrame();
      const edgeRows = parseTSV(edgesText);
      setStatus('Indexing facts...');
      await nextFrame();

      const nodeMap = new Map();
      nodeRows.forEach((row) => {
        if (!row.id) {
          return;
        }
        let node = nodeMap.get(row.id);
        if (!node) {
          node = {
            id: row.id,
            label: row.label || row.id,
            types: new Set(),
            isSign: false,
            kind: 'other',
            degree: 0,
            outgoingFacts: 0,
            incomingFacts: 0
          };
          nodeMap.set(row.id, node);
        }
        node.types.add(row.type || 'other');
      });

      nodeMap.forEach((node) => {
        node.types = Array.from(node.types).sort(typeSort);
        node.isSign = node.types.includes('translation');
        node.kind = node.isSign ? 'sign' : dominantKind(node.types);
      });

      const factNodeIndex = new Map();
      const propertyNodeSourceType = new Map();
      const factsBySign = new Map();
      const factsByNode = new Map();
      const nodeNeighbors = new Map();
      const allFacts = [];
      const relationCounts = new Map();
      const factTypeCounts = new Map();

      edgeRows.forEach((row, index) => {
        const subjectId = row.node1;
        const relation = row.relation || 'unknown';
        const factType = row.type || 'other';
        const sourceName = row.source || 'unknown';

        if (!nodeMap.has(subjectId)) {
          return;
        }

        const subjectNode = nodeMap.get(subjectId);
        const objectInfo = resolveObject(row.node2, relation, factType, nodeMap);
        if (!objectInfo) return; // unresolvable N### — skip entirely
        const objectKey = objectInfo.id;

        if (!factNodeIndex.has(objectKey)) {
          factNodeIndex.set(objectKey, {
            id: objectKey,
            label: objectInfo.label,
            isSign: objectInfo.kind === 'sign',
            kind: objectInfo.kind,
            factType,
            relation,
            value: objectInfo.value,
            degree: 0,
            outgoingFacts: 0,
            incomingFacts: 0,
            synthetic: objectInfo.synthetic
          });
        }

        if (!propertyNodeSourceType.has(objectKey)) {
          propertyNodeSourceType.set(objectKey, factType);
        }

        const objectNode = factNodeIndex.get(objectKey);
        const fact = {
          id: `fact-${index}`,
          subjectId,
          relation,
          factType,
          sourceName,
          objectId: objectKey,
          objectLabel: objectNode.label,
          objectKind: objectNode.kind,
          synthetic: objectNode.synthetic,
          rawValue: row.node2,
          numericValue: numericFactValue(row.node2, factType),
          isNumeric: numericFactValue(row.node2, factType) !== null,
          truthy: numericFactValue(row.node2, factType) === 1,
          searchText: `${relation} ${objectNode.label} ${row.node2} ${factType} ${sourceName}`.toLowerCase()
        };

        allFacts.push(fact);
        addToArrayMap(factsBySign, subjectId, fact);
        addToArrayMap(factsByNode, objectKey, fact);
        addToArrayMap(nodeNeighbors, subjectId, objectKey);
        addToArrayMap(nodeNeighbors, objectKey, subjectId);
        increment(relationCounts, relation);
        increment(factTypeCounts, factType);

        subjectNode.outgoingFacts += 1;
        subjectNode.degree += 1;
        objectNode.incomingFacts += 1;
        objectNode.degree += 1;
      });

      const signNodes = Array.from(nodeMap.values()).filter((node) => node.isSign);
      const signIds = signNodes.map((node) => node.id);

      const graphStats = {
        nodes: nodeMap.size,
        signs: signNodes.length,
        properties: factNodeIndex.size,
        facts: allFacts.length,
        relations: relationCounts.size
      };

      const signFeatureCache = new Map();
      const featureFrequency = new Map();
      const numericRanges = new Map();
      const categoricalIndex = new Map();
      const numericRelationIndex = new Map();

      signIds.forEach((signId) => {
        const features = buildSignFeatures(signId, factsBySign.get(signId) || []);
        signFeatureCache.set(signId, features);
        features.categorical.forEach((set, typeKey) => {
          if (!categoricalIndex.has(typeKey)) {
            categoricalIndex.set(typeKey, new Map());
          }
          set.forEach((featureKey) => increment(featureFrequency, featureKey));
          set.forEach((featureKey) => addToArrayMap(categoricalIndex.get(typeKey), featureKey, signId));
        });
        features.numeric.forEach((map, typeKey) => {
          if (!numericRelationIndex.has(typeKey)) {
            numericRelationIndex.set(typeKey, new Map());
          }
          map.forEach((value, relationKey) => {
            const rangeKey = `${typeKey}|${relationKey}`;
            if (!numericRanges.has(rangeKey)) {
              numericRanges.set(rangeKey, { min: value, max: value });
            } else {
              const range = numericRanges.get(rangeKey);
              range.min = Math.min(range.min, value);
              range.max = Math.max(range.max, value);
            }
            addToArrayMap(numericRelationIndex.get(typeKey), relationKey, signId);
          });
        });
      });

      // Mark binary relations on facts and update binary-true node labels
      const isBinaryRange = (range) => range &&
        (range.min === 0 || range.min === 1) && (range.max === 0 || range.max === 1);

      allFacts.forEach((fact) => {
        if (!fact.isNumeric) return;
        fact.isBinaryRelation = isBinaryRange(numericRanges.get(`${fact.factType}|${fact.relation}`));
      });

      factNodeIndex.forEach((node) => {
        if (!node.synthetic || !node.relation) return;
        const range = numericRanges.get(`${node.factType}|${node.relation}`);
        if (isBinaryRange(range) && (Number(node.value) === 1 || node.value === '1' || node.value === '1.0')) {
          node.label = node.relation;
          node.isBinaryTrue = true;
        }
      });

      state.data = {
        nodeMap,
        signIds,
        signNodes,
        allFacts,
        factsBySign,
        factsByNode,
        nodeNeighbors,
        relations: Array.from(relationCounts.keys()).sort(),
        relationCounts,
        factTypeCounts,
        factNodeIndex,
        propertyNodeSourceType,
        relationOptions: topEntries(relationCounts, 300).map(([relation]) => relation),
        graphStats,
        signFeatureCache,
        featureFrequency,
        numericRanges,
        categoricalIndex,
        numericRelationIndex,
        similarityCache: new Map(),
        topDegreeSigns: signNodes.slice().sort((a, b) => d3.descending(a.outgoingFacts, b.outgoingFacts)).slice(0, 400)
      };

      state.loaded = true;
      state.selectedNodeId = chooseInitialSign();
      state.mode = 'breadth';
      state.pathNodes = [];

      renderRelationOptions();
      renderFactTypeChips();
      renderClauses();
      updateControls();
      renderSearch();
      renderPathPanel();
      refreshGraph({ refit: true });

      renderOverview();
      setStatus(`Loaded ${formatNumber(graphStats.signs)} signs, ${formatNumber(graphStats.properties)} property nodes, and ${formatNumber(graphStats.facts)} facts.`);
    }

    function chooseInitialSign() {
      const sign = state.data.topDegreeSigns.find((node) => !BLOCKED_PATH_LABELS.has(normalize(node.label)));
      return sign?.id || state.data.signIds[0] || null;
    }

    function buildSignFeatures(signId, facts) {
      const categorical = new Map();
      const numeric = new Map();

      facts.forEach((fact) => {
        const bucketKey = fact.factType;
        if (!categorical.has(bucketKey)) {
          categorical.set(bucketKey, new Set());
        }
        if (!numeric.has(bucketKey)) {
          numeric.set(bucketKey, new Map());
        }

        if (fact.isNumeric) {
          if (fact.factType === 'phonological' && fact.numericValue === 0) {
            return;
          }
          if (fact.factType === 'phonological' && fact.numericValue === 1) {
            categorical.get(bucketKey).add(`${fact.relation}::1`);
            return;
          }
          numeric.get(bucketKey).set(fact.relation, fact.numericValue);
          return;
        }

        categorical.get(bucketKey).add(`${fact.relation}::${normalize(fact.objectLabel)}`);
      });

      return { signId, categorical, numeric };
    }

    function resolveObject(rawValue, relation, factType, nodeMap) {
      if (/^N\d+$/.test(rawValue)) {
        if (!nodeMap.has(rawValue)) {
          // N### ID with no node entry — cannot produce a readable label, skip this fact.
          return null;
        }
        const node = nodeMap.get(rawValue);
        if (node.isSign) {
          // Sign-to-sign reference: use the sign's own ID so it renders as a sign node.
          return { id: rawValue, label: node.label, value: node.label, kind: 'sign', synthetic: false };
        }
        return {
          id: `node:${rawValue}`,
          label: node.label,
          value: node.label,
          kind: dominantKind(node.types),
          synthetic: false
        };
      }

      const numeric = numericFactValue(rawValue, factType);
      if (numeric !== null && factType === 'phonological' && numeric === 0) {
        return {
          id: `lit:${factType}:${relation}:false`,
          label: `${relation}: false`,
          value: '0',
          kind: factType,
          synthetic: true
        };
      }

      return {
        id: `lit:${factType}:${relation}:${normalize(String(rawValue))}`,
        label: formatFactLabel(relation, rawValue),
        value: rawValue,
        kind: factType,
        synthetic: true
      };
    }

    function formatFactLabel(relation, rawValue) {
      const value = String(rawValue);
      return value.length > 28 ? `${relation}: ${value.slice(0, 28)}…` : `${relation}: ${value}`;
    }

    function numericFactValue(value, factType) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) {
        return null;
      }
      if (factType === 'phonological' && numeric === 0) {
        return 0;
      }
      return numeric;
    }

    function updateTabState() {
      els.tabs.forEach((tab) => tab.classList.toggle('active', tab.dataset.tab === state.activeTab));
      els.panels.forEach((panel) => panel.classList.toggle('active', panel.dataset.panel === state.activeTab));
      if (state.activeTab === 'overview') {
        renderWeightSliders(els.overviewSimilaritySliders, state.similarity, () => {

        els.overviewStats.innerHTML = `

      } else {
        els.overviewStats.innerHTML = '<div class="micro" style="padding:12px;">Load data to see overview.</div>';
      }

    function renderSelectionCard() {
      const node = currentNode();

      if (!node) {
        els.closeNodeButton.style.display = 'none';
        els.nodeTabs.style.display = 'none';
        els.nodeFactsPane.classList.remove('active');
        els.nodeRelatedPane.classList.remove('active');
        els.selectionName.textContent = '';
        els.selectionPills.innerHTML = '';
        els.nodeFactsPane.innerHTML = '';
        els.selectionSummary.innerHTML = '';
        renderOverview();
        return;
      }

      els.nodeTabs.style.display = '';

      els.closeNodeButton.style.display = '';
      els.selectionName.textContent = node.label;

      if (!node.isSign) {
        els.selectionPills.innerHTML = `<span class="pill"><span class="swatch" style="background:${nodeColor(node)}"></span>${escapeHtml(node.kind)}</span>`;
      } else {
        els.selectionPills.innerHTML = '';
      }

      const relatedCount = node.isSign ? getSimilarSignsWeighted(node.id, state.similarity, 18).length : 0;
      els.selectionSummary.innerHTML = `
        ${summaryCard(node.isSign ? node.outgoingFacts : node.incomingFacts, node.isSign ? 'facts' : 'incoming')}
        ${summaryCard(node.degree, 'degree')}
        ${summaryCard(relatedCount, 'related')}
      `;

      renderNodeTabs();
    }

    function renderNodeTabs() {
      const tabs = els.nodeTabs.querySelectorAll('[data-node-tab]');
      tabs.forEach((btn) => btn.classList.toggle('active', btn.dataset.nodeTab === state.nodeTab));
      els.nodeFactsPane.classList.toggle('active', state.nodeTab === 'facts');
      els.nodeRelatedPane.classList.toggle('active', state.nodeTab === 'related');
      if (state.nodeTab === 'facts') {
        renderNodeFactsPane(currentNode());
      } else if (state.nodeTab === 'related') {
        renderRelated();
      }
    }

    function renderNodeFactsPane(node) {
      if (!node || !node.isSign) {
        els.nodeFactsPane.innerHTML = '';
        return;
      }
      const allFacts = state.data.factsBySign.get(node.id) || [];
      const availableTypes = [...new Set(allFacts.map((f) => f.factType))].sort(typeSort);
      if (!state.selectedFactType || !availableTypes.includes(state.selectedFactType)) {
        state.selectedFactType = availableTypes[0] || null;
      }
      const facts = allFacts
        .filter((f) => !state.selectedFactType || f.factType === state.selectedFactType)
        .slice(0, 80);
      els.nodeFactsPane.innerHTML = `
        <select class="fact-type-select" id="factTypeSelect">
          ${availableTypes.map((type) => `<option value="${escapeHtml(type)}"${type === state.selectedFactType ? ' selected' : ''}>${escapeHtml(type)}</option>`).join('')}
        </select>
        ${facts.length ? `
        <div class="node-facts-list">
          ${facts.map((fact) => `
            <div class="node-fact-row">
              <span class="node-fact-relation">${escapeHtml(fact.relation)}</span>
              <span class="node-fact-value">${escapeHtml(fact.objectLabel)}</span>
            </div>
          `).join('')}
        </div>
        ` : '<div class="micro" style="padding:8px 0;">No facts for this type.</div>'}
      `;
      document.getElementById('factTypeSelect')?.addEventListener('change', (e) => {
        state.selectedFactType = e.target.value;
        renderNodeFactsPane(node);
      });
    }

    function renderRelationOptions() {
      els.relationOptions.innerHTML = state.data.relationOptions.map((relation) => `<option value="${escapeHtml(relation)}"></option>`).join('');
    }

    function renderFactTypeChips() {
      els.factTypeMeta.textContent = `${state.filters.factTypes.size}/${FACT_TYPES.length}`;
      els.factTypeChips.innerHTML = FACT_TYPES.map((factType) => {
        const count = state.data.factTypeCounts.get(factType) || 0;
        return `
          <button class="chip ${state.filters.factTypes.has(factType) ? 'active' : ''}" type="button" data-fact-type="${escapeHtml(factType)}">
            <span class="swatch" style="background:${factTypeColor(factType)}"></span>${escapeHtml(factType)} <small>${formatNumber(count)}</small>
          </button>
        `;
      }).join('');
      els.factTypeChips.querySelectorAll('[data-fact-type]').forEach((button) => {
        button.addEventListener('click', () => {
          toggleSet(state.filters.factTypes, button.dataset.factType);
          renderFactTypeChips();
          refreshGraph({ refit: true });
        });
      });
    }

    function addClause() {
      const relation = els.relationInput.value.trim();
      const value = els.valueInput.value.trim();
      if (!relation && !value) {
        return;
      }
      state.filters.clauses.push({
        id: `clause-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`,
        relation: relation.toLowerCase(),
        value: value.toLowerCase()
      });
      els.relationInput.value = '';
      els.valueInput.value = '';
      renderClauses();
      refreshGraph({ refit: true });
    }

    function renderClauses() {
      els.clauseMeta.textContent = `${state.filters.clauses.length}`;
      if (!state.filters.clauses.length) {
        els.clauseList.innerHTML = '';
        return;
      }
      els.clauseList.innerHTML = state.filters.clauses.map((clause) => `
        <span class="clause-pill">
          <span>${escapeHtml([clause.relation, clause.value].filter(Boolean).join(' · '))}</span>
          <button type="button" data-remove-clause="${escapeHtml(clause.id)}">×</button>
        </span>
      `).join('');
      els.clauseList.querySelectorAll('[data-remove-clause]').forEach((button) => {
        button.addEventListener('click', () => {
          state.filters.clauses = state.filters.clauses.filter((clause) => clause.id !== button.dataset.removeClause);
          renderClauses();
          refreshGraph({ refit: true });
        });
      });
    }

    function resetFilters() {
      state.filters.factTypes = new Set(['phonological', 'semantic', 'syntactic', 'systematicity', 'cognitive', 'other']);
      state.filters.clauses = [];
      state.filters.signLimit = 50;
      state.filters.factLimit = 120;
      state.mode = 'breadth';
      state.layout = 'grouped';
      state.pathNodes = [];
      state.selectedFactType = null;
      els.relationInput.value = '';
      els.valueInput.value = '';
      els.signLimitInput.value = String(state.filters.signLimit);
      els.factLimitInput.value = String(state.filters.factLimit);
      renderFactTypeChips();
      renderClauses();
      updateControls();
      refreshGraph({ refit: true });
    }

    function renderSearch() {
      if (!state.loaded) {
        els.searchList.innerHTML = '<div class="micro" style="padding:12px;">Load graph data to search.</div>';
        return;
      }
      const q = els.searchInput.value.trim().toLowerCase();
      if (!q) {
        els.searchList.innerHTML = '<div class="micro" style="padding:12px;">Type to search signs.</div>';
        return;
      }
      const matches = Array.from(allGraphNodes().values())
        .filter((node) => node.label.toLowerCase().includes(q) || node.id.toLowerCase().includes(q))
        .sort((a, b) => d3.descending(matchScore(a, q), matchScore(b, q)) || d3.descending(a.degree || 0, b.degree || 0))
        .slice(0, 28);
      if (!matches.length) {
        els.searchList.innerHTML = `<div class="micro" style="padding:12px;">No results for "${escapeHtml(q)}".</div>`;
        return;
      }
      els.searchList.innerHTML = matches.map((node) => `
        <button class="list-row" type="button" data-pick-node="${escapeHtml(node.id)}">
          <span class="row-title">${escapeHtml(node.label)}</span>
          <span class="row-meta">${escapeHtml(node.isSign ? 'sign' : `${node.kind} property`)}</span>
        </button>
      `).join('');
      els.searchList.querySelectorAll('[data-pick-node]').forEach((button) => {
        button.addEventListener('click', () => {
          const nodeId = button.dataset.pickNode;
          state.mode = 'focus';
          setSelectedNode(nodeId, { refit: true, clearPath: false });
        });
      });
    }

    function focusRandomSign() {
      const signs = filteredSigns().slice(0, 500);
      const sign = signs[Math.floor(Math.random() * signs.length)] || state.data.topDegreeSigns[0];
      if (sign) {
        state.mode = 'focus';
        setSelectedNode(sign.id, { refit: true, clearPath: false });
      }
    }

    function focusTopSign() {
      const sign = filteredSigns()[0] || state.data.topDegreeSigns[0];
      if (sign) {
        state.mode = 'focus';
        setSelectedNode(sign.id, { refit: true, clearPath: false });
      }
    }

    function activeSimilarityTypes() {
      return SIMILARITY_TYPES.filter((t) => state.similarity[t] > 0);
    }

    function filteredSigns() {
      return state.data.signNodes.filter((sign) => {
        const facts = state.data.factsBySign.get(sign.id) || [];
        if (!facts.length) {
          return false;
        }
        const activeFacts = facts.filter((fact) => state.filters.factTypes.has(fact.factType));
        if (!activeFacts.length) {
          return false;
        }
        return state.filters.clauses.every((clause) => activeFacts.some((fact) => clauseMatchesFact(clause, fact)));
      }).sort((a, b) => d3.descending(a.outgoingFacts, b.outgoingFacts));
    }

    function clauseMatchesFact(clause, fact) {
      const relationMatch = !clause.relation || fact.relation.toLowerCase().includes(clause.relation);
      const valueMatch = !clause.value || fact.objectLabel.toLowerCase().includes(clause.value) || String(fact.rawValue).toLowerCase().includes(clause.value);
      return relationMatch && valueMatch;
    }

    function refreshGraph(options = {}) {
      if (!state.loaded) {
        return;
      }
      const previousGraph = state.currentGraph;
      const graph = state.pathNodes.length ? buildPathGraph() : (state.mode === 'focus' ? buildFocusGraph() : buildBreadthGraph());
      state.currentGraph = graph;

      const width = els.graph.clientWidth || window.innerWidth;
      const height = els.graph.clientHeight || window.innerHeight;
      svg.attr('viewBox', [0, 0, width, height]);
      simulation.force('center', d3.forceCenter(width / 2, height / 2));
      applyGroupingForces(width, height, graph.nodes);
      renderGuides(width, height, graph.nodes);

      const previousPositions = new Map((previousGraph.nodes || []).map((node) => [node.id, node]));
      graph.nodes.forEach((node) => {
        const previous = options.preservePositions ? previousPositions.get(node.id) : null;
        if (previous && Number.isFinite(previous.x) && Number.isFinite(previous.y)) {
          node.x = previous.x;
          node.y = previous.y;
          node.vx = previous.vx || 0;
          node.vy = previous.vy || 0;
        } else if (state.layout === 'grouped') {
          const anchors = getGroupAnchors(width, height);
          const kind = node.isSign ? 'sign' : (node.kind || 'other');
          const anchor = anchors[kind] || { x: width / 2, y: height / 2 };
          node.x = anchor.x + (Math.random() - 0.5) * 50;
          node.y = anchor.y + (Math.random() - 0.5) * 50;
        } else {
          node.x = width / 2 + (Math.random() - 0.5) * 180;
          node.y = height / 2 + (Math.random() - 0.5) * 180;
        }
      });

      renderGraph(graph);
      renderSelectionCard();
      renderPathPanel();

      simulation.nodes(graph.nodes);
      simulation.force('link').links([...graph.links, ...(graph.syntheticLinks || [])]);
      simulation.alpha(options.softRestart ? 0.25 : 0.9).restart();
      if (state.frozen) {
        simulation.stop();
      }

      if (options.refit) {
        setTimeout(() => fitGraph(), 120);
      }
    }

    function buildBreadthGraph() {
      const signPool = filteredSigns();
      const signNodes = signPool.slice(0, state.filters.signLimit).map((sign) => graphNodeFromSign(sign));
      const signIds = new Set(signNodes.map((node) => node.id));
      const factCounts = new Map();

      signIds.forEach((signId) => {
        (state.data.factsBySign.get(signId) || []).forEach((fact) => {
          if (!state.filters.factTypes.has(fact.factType)) {
            return;
          }
          if (!shouldShowInGraph(fact)) {
            return;
          }
          if (!factCounts.has(fact.objectId)) {
            factCounts.set(fact.objectId, {
              node: propertyGraphNode(fact.objectId),
              count: 0
            });
          }
          factCounts.get(fact.objectId).count += 1;
        });
      });

      const propertyNodes = Array.from(factCounts.values())
        .sort((a, b) => d3.descending(a.count, b.count) || a.node.label.localeCompare(b.node.label))
        .slice(0, state.filters.factLimit)
        .map((entry) => entry.node);

      const propertyIds = new Set(propertyNodes.map((node) => node.id));
      const links = [];
      signIds.forEach((signId) => {
        (state.data.factsBySign.get(signId) || []).forEach((fact) => {
          if (!state.filters.factTypes.has(fact.factType) || !propertyIds.has(fact.objectId)) {
            return;
          }
          if (!shouldShowInGraph(fact)) {
            return;
          }
          links.push(graphLink(fact));
        });
      });

      return { nodes: dedupeNodes([...signNodes, ...propertyNodes]), links, syntheticLinks: [] };
    }

    function buildFocusGraph() {
      const selected = currentNode();
      if (!selected) {
        return { nodes: [], links: [], syntheticLinks: [] };
      }

      if (selected.isSign) {
        const factNodes = [];
        const links = [];
        (state.data.factsBySign.get(selected.id) || []).forEach((fact) => {
          if (!state.filters.factTypes.has(fact.factType)) {
            return;
          }
          if (!shouldShowInGraph(fact)) {
            return;
          }
          factNodes.push(propertyGraphNode(fact.objectId));
          links.push(graphLink(fact));
        });
        const limitedFactNodes = dedupeNodes(factNodes).slice(0, state.filters.factLimit);
        const factIds = new Set(limitedFactNodes.map((node) => node.id));
        const overlaySignNodes = [];
        (state.relatedOverlay || []).forEach((overlayId) => {
          if (overlayId === selected.id) return;
          const ovSign = state.data.nodeMap.get(overlayId);
          if (!ovSign) return;
          overlaySignNodes.push(graphNodeFromSign(ovSign));
          (state.data.factsBySign.get(overlayId) || []).forEach((fact) => {
            if (state.filters.factTypes.has(fact.factType) && factIds.has(fact.objectId)) {
              links.push(graphLink(fact));
            }
          });
        });
        return {
          nodes: dedupeNodes([graphNodeFromSign(selected), ...limitedFactNodes, ...overlaySignNodes]),
          links: links.filter((link) => factIds.has(link.target)),
          syntheticLinks: []
        };
      }

      const incidentFacts = state.data.factsByNode.get(selected.id) || [];
      const signNodes = dedupeNodes(incidentFacts.map((fact) => graphNodeFromSign(state.data.nodeMap.get(fact.subjectId)))).slice(0, state.filters.signLimit);
      const signIds = new Set(signNodes.map((node) => node.id));
      const links = incidentFacts.filter((fact) => signIds.has(fact.subjectId)).map(graphLink);
      return {
        nodes: [propertyGraphNode(selected.id), ...signNodes],
        links,
        syntheticLinks: []
      };
    }

    function buildPathGraph() {
      const pathSignNodes = dedupeNodes(state.pathNodes.map((nodeId) => graphNodeFromSign(state.data.nodeMap.get(nodeId))));
      const nodes = [...pathSignNodes];
      const links = [];
      const syntheticLinks = [];
      // Deduplicate bridge nodes across hops by feature key so the same feature
      // isn't rendered twice when shared by multiple consecutive sign pairs.
      const bridgeNodeIds = new Map(); // feature.key → bridgeId

      for (let index = 0; index < state.pathNodes.length - 1; index += 1) {
        const a = state.pathNodes[index];
        const b = state.pathNodes[index + 1];
        const shared = sharedFeatures(a, b, activeSimilarityTypes()).slice(0, 3);
        shared.forEach((feature) => {
          let bridgeId = bridgeNodeIds.get(feature.key);
          if (!bridgeId) {
            bridgeId = `bridge:${feature.key}`;
            bridgeNodeIds.set(feature.key, bridgeId);
            nodes.push({
              id: bridgeId,
              label: feature.label,
              isSign: false,
              kind: feature.type,
              factType: feature.type,
              degree: 2,
              synthetic: true,
              bridge: true
            });
          }
          links.push({
            id: `bridge-link-${a}-${bridgeId}`,
            source: a,
            target: bridgeId,
            factType: feature.type,
            synthetic: false,
            relation: feature.relation
          });
          links.push({
            id: `bridge-link-${b}-${bridgeId}`,
            source: b,
            target: bridgeId,
            factType: feature.type,
            synthetic: false,
            relation: feature.relation
          });
        });
        syntheticLinks.push({
          id: `path:${a}:${b}`,
          source: a,
          target: b,
          factType: 'other',
          synthetic: true,
          relation: 'path'
        });
      }

      return { nodes: dedupeNodes(nodes), links, syntheticLinks };
    }

    function graphNodeFromSign(sign) {
      return {
        id: sign.id,
        label: sign.label,
        isSign: true,
        kind: 'sign',
        factType: 'translation',
        degree: sign.outgoingFacts,
        outgoingFacts: sign.outgoingFacts,
        types: sign.types
      };
    }

    function propertyGraphNode(objectId) {
      const entry = state.data.factNodeIndex.get(objectId);
      // Sign-referenced objects (sign-to-sign relations) render as sign nodes.
      if (entry?.isSign) {
        const sign = state.data.nodeMap.get(objectId);
        if (sign) return graphNodeFromSign(sign);
      }
      return {
        id: objectId,
        label: entry.label,
        isSign: false,
        kind: entry.kind || state.data.propertyNodeSourceType.get(objectId) || 'other',
        factType: entry.factType || state.data.propertyNodeSourceType.get(objectId) || 'other',
        degree: entry.degree || 0,
        synthetic: entry.synthetic
      };
    }

    // Returns true if a fact should appear as a node/edge in the graph visualization.
    // Non-binary numeric facts are hidden from the graph (shown only in the Facts tab).
    // Binary (0/1) facts: only value=1 (true) is shown. False (0) is never shown.
    function shouldShowInGraph(fact) {
      if (!fact.isNumeric) return true;
      if (fact.numericValue === 0) return false;
      // Phonological value=1 facts are binary by convention; buildSignFeatures moves them
      // to categorical so they won't have a numericRanges entry — treat as binary-true.
      if (fact.factType === 'phonological' && fact.numericValue === 1) return true;
      // For all other types: only show if the range is confirmed binary [0,1] and value=1.
      return fact.isBinaryRelation && fact.numericValue === 1;
    }

    function graphLink(fact) {
      return {
        id: fact.id,
        source: fact.subjectId,
        target: fact.objectId,
        factType: fact.factType,
        relation: fact.relation,
        synthetic: false
      };
    }

    function applyForceWeights() {
      if (state.layout === 'grouped') return;
      const linkForce = simulation.force('link');
      if (linkForce) linkForce.strength((d) => {
        if (d.synthetic) return 0.18;
        const w = state.similarity[d.factType] !== undefined ? state.similarity[d.factType] : 1.0;
        return w * 0.12;
      });
      simulation.alpha(Math.max(simulation.alpha(), 0.2)).restart();
    }

    function applyGroupingForces(width, height, nodes) {
      simulation.force('xKind', null);
      simulation.force('yKind', null);
      const linkForce = simulation.force('link');
      if (state.layout !== 'grouped') {
        simulation.force('groupContain', null);
        simulation.force('charge', d3.forceManyBody().strength(-120));
        simulation.force('collide', d3.forceCollide().radius((d) => nodeRadius(d) + 7));
        simulation.force('center', d3.forceCenter(width / 2, height / 2));
        if (linkForce) linkForce.strength((d) => {
          if (d.synthetic) return 0.18;
          const w = state.similarity[d.factType] !== undefined ? state.similarity[d.factType] : 1.0;
          return w * 0.12;
        });
        return;
      }
      // In grouped mode: all global forces off, custom containment handles everything
      simulation.force('charge', null);
      simulation.force('collide', null);
      simulation.force('center', null);
      if (linkForce) linkForce.strength(0);
      simulation.force('groupContain', createGroupContainmentForce(width, height));
    }

    function getGroupAnchors(width, height) {
      return {
        sign:          { x: width * 0.24, y: height * 0.46 },
        phonological:  { x: width * 0.62, y: height * 0.22 },
        semantic:      { x: width * 0.74, y: height * 0.48 },
        syntactic:     { x: width * 0.54, y: height * 0.72 },
        systematicity: { x: width * 0.80, y: height * 0.76 },
        cognitive:     { x: width * 0.90, y: height * 0.28 },
        other:         { x: width * 0.52, y: height * 0.50 }
      };
    }

    function createGroupContainmentForce(width, height) {
      const anchors = getGroupAnchors(width, height);

      // Supernodes are independent physics objects with their own x/y/vx/vy.
      const supernodes = new Map();
      Object.entries(anchors).forEach(([kind, pos]) => {
        supernodes.set(kind, { kind, x: pos.x, y: pos.y, vx: 0, vy: 0, r: 60, members: [] });
      });

      let allNodes;

      function force(/* alpha unused — all forces are alpha-independent */) {
        if (!allNodes) return;

        // 1. Assign members & recompute radii
        supernodes.forEach((sn) => { sn.members = []; });
        allNodes.forEach((node) => {
          if (!Number.isFinite(node.x) || !Number.isFinite(node.y) || node.bridge) return;
          const kind = node.isSign ? 'sign' : (node.kind || 'other');
          const sn = supernodes.get(kind);
          if (sn) sn.members.push(node);
        });
        supernodes.forEach((sn) => {
          sn.r = sn.members.length ? Math.sqrt(sn.members.length) * 19 + 42 : 42;
        });

        const active = Array.from(supernodes.values()).filter((sn) => sn.members.length > 0);

        // 2. Count visible inter-supernode connections
        const connCounts = new Map(); // key = "kindA|kindB" (sorted)
        if (state.currentGraph && state.currentGraph.links) {
          state.currentGraph.links.forEach((link) => {
            const src = link.source, tgt = link.target;
            if (!src || !tgt) return;
            const sk = src.isSign ? 'sign' : (src.kind || 'other');
            const tk = tgt.isSign ? 'sign' : (tgt.kind || 'other');
            if (sk === tk) return; // intra-supernode — skip
            const key = [sk, tk].sort().join('|');
            connCounts.set(key, (connCounts.get(key) || 0) + 1);
          });
        }

        // 3. Supernode–supernode spring attraction (proportional to sqrt(connections))
        for (let i = 0; i < active.length; i++) {
          for (let j = i + 1; j < active.length; j++) {
            const a = active[i], b = active[j];
            const key = [a.kind, b.kind].sort().join('|');
            const count = connCounts.get(key) || 0;
            if (count === 0) continue;
            const dx = b.x - a.x, dy = b.y - a.y;
            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
            const rest = a.r + b.r + 20; // target: just touching with a small gap
            const stretch = dist - rest;
            if (stretch <= 0) continue; // only attract, collision handles push
            const k = 0.0008 * Math.sqrt(count);
            const fx = (dx / dist) * stretch * k;
            const fy = (dy / dist) * stretch * k;
            a.vx += fx; a.vy += fy;
            b.vx -= fx; b.vy -= fy;
          }
        }

        // 4. Supernode–supernode hard collision (alpha-independent)
        for (let i = 0; i < active.length; i++) {
          for (let j = i + 1; j < active.length; j++) {
            const a = active[i], b = active[j];
            const dx = b.x - a.x, dy = b.y - a.y;
            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
            const minDist = a.r + b.r + 12;
            if (dist < minDist) {
              const push = (minDist - dist) / dist * 0.55;
              a.vx -= dx * push; a.vy -= dy * push;
              b.vx += dx * push; b.vy += dy * push;
            }
          }
        }

        // 5. Centroid centering — keep the cloud of active supernodes near viewport center
        let cx = 0, cy = 0;
        active.forEach((sn) => { cx += sn.x; cy += sn.y; });
        cx /= active.length; cy /= active.length;
        const pullCenter = 0.012;
        active.forEach((sn) => {
          sn.vx += (width / 2 - cx) * pullCenter;
          sn.vy += (height / 2 - cy) * pullCenter;
        });

        // 6. Integrate supernodes (damping + soft screen bounds)
        supernodes.forEach((sn) => {
          if (!sn.members.length) return;
          sn.vx *= 0.68; sn.vy *= 0.68;
          sn.x += sn.vx; sn.y += sn.vy;
          const margin = sn.r + 12;
          if (sn.x < margin)           { sn.x = margin;          sn.vx *= -0.3; }
          if (sn.x > width  - margin)  { sn.x = width  - margin; sn.vx *= -0.3; }
          if (sn.y < margin)           { sn.y = margin;          sn.vy *= -0.3; }
          if (sn.y > height - margin)  { sn.y = height - margin; sn.vy *= -0.3; }
        });

        // 7. Intra-supernode Coulomb repulsion (only within the same group, no cross-group)
        const K = 500;
        for (let i = 0; i < allNodes.length; i++) {
          const ni = allNodes[i];
          if (ni.bridge || !Number.isFinite(ni.x)) continue;
          const ki = ni.isSign ? 'sign' : (ni.kind || 'other');
          for (let j = i + 1; j < allNodes.length; j++) {
            const nj = allNodes[j];
            if (nj.bridge || !Number.isFinite(nj.x)) continue;
            const kj = nj.isSign ? 'sign' : (nj.kind || 'other');
            if (ki !== kj) continue; // only within same supernode
            const dx = ni.x - nj.x, dy = ni.y - nj.y;
            const dist2 = dx * dx + dy * dy || 0.01;
            const dist = Math.sqrt(dist2);
            const f = K / dist2 / dist; // K / dist³ gives unit vector * K/dist²
            ni.vx += dx * f; ni.vy += dy * f;
            nj.vx -= dx * f; nj.vy -= dy * f;
          }
        }

        // 8. Gentle pull toward supernode center (keeps nodes centered as SN moves; no alpha)
        const inPull = 0.035;
        allNodes.forEach((node) => {
          if (node.bridge || !Number.isFinite(node.x)) return;
          const kind = node.isSign ? 'sign' : (node.kind || 'other');
          const sn = supernodes.get(kind);
          if (!sn || !sn.members.length) return;
          node.vx += (sn.x - node.x) * inPull;
          node.vy += (sn.y - node.y) * inPull;
        });

        // 8b. Intra-supernode node–node collision
        supernodes.forEach((sn) => {
          const m = sn.members;
          for (let i = 0; i < m.length; i++) {
            for (let j = i + 1; j < m.length; j++) {
              const ni = m[i], nj = m[j];
              if (!Number.isFinite(ni.x) || !Number.isFinite(nj.x)) continue;
              const dx = ni.x - nj.x, dy = ni.y - nj.y;
              const dist = Math.sqrt(dx * dx + dy * dy) || 0.01;
              const minD = nodeRadius(ni) + nodeRadius(nj) + 4;
              if (dist < minD) {
                const push = (minD - dist) / dist * 0.5;
                ni.vx += dx * push; ni.vy += dy * push;
                nj.vx -= dx * push; nj.vy -= dy * push;
              }
            }
          }
        });

        // 9. Hard clamp: keep nodes inside their supernode circle, cancel outward velocity
        allNodes.forEach((node) => {
          if (!Number.isFinite(node.x) || !Number.isFinite(node.y) || node.bridge) return;
          const kind = node.isSign ? 'sign' : (node.kind || 'other');
          const sn = supernodes.get(kind);
          if (!sn || !sn.members.length) return;
          const dx = node.x - sn.x, dy = node.y - sn.y;
          const dist = Math.sqrt(dx * dx + dy * dy) || 1;
          const maxR = sn.r - nodeRadius(node) - 3;
          if (dist > maxR && maxR > 0) {
            node.x = sn.x + (dx / dist) * maxR;
            node.y = sn.y + (dy / dist) * maxR;
            const vr = node.vx * (dx / dist) + node.vy * (dy / dist);
            if (vr > 0) { node.vx -= vr * (dx / dist); node.vy -= vr * (dy / dist); }
          }
        });

        state.currentGroupCircles = supernodes;
      }

      force.initialize = function (_nodes) { allNodes = _nodes; };
      return force;
    }

    function renderGuides(width, height, nodes) {
      guideLayer.selectAll('*').remove();
      if (state.layout !== 'grouped') {
        return;

      const activeKinds = new Set(nodes.map((node) => node.isSign ? 'sign' : node.kind));

      guideLayer.selectAll('circle.guide-circle')

    function renderGraph(graph) {
      const activePathEdges = new Set(pathEdgeKeys(state.pathNodes));

      const allLinks = [...graph.links, ...(graph.syntheticLinks || [])];
      const linkJoin = linkLayer.selectAll('line').data(allLinks, (d) => d.id);
      linkJoin.exit().remove();
      linkJoin.enter().append('line').attr('stroke-linecap', 'round').merge(linkJoin);

      const nodeJoin = nodeLayer.selectAll('circle').data(graph.nodes, (d) => d.id);
      nodeJoin.exit().remove();
      nodeJoin.enter()
        .append('circle')
        .style('cursor', 'pointer')
        .on('mouseenter', (event, node) => {
          state.hoveredNodeId = node.id;
          showTooltip(event, tooltipHtml(node));
          updateGraphStyles();
        })
        .on('mousemove', (event, node) => showTooltip(event, tooltipHtml(node)))
        .on('mouseleave', () => {
          state.hoveredNodeId = null;
          hideTooltip();
          updateGraphStyles();
        })
        .on('click', (event, node) => {
          state.mode = 'focus';
          setSelectedNode(node.id, { refit: true, clearPath: false });
          event.stopPropagation();
        })
        .call(d3.drag().on('start', dragStarted).on('drag', dragged).on('end', dragEnded))
        .merge(nodeJoin)
        .attr('r', (d) => nodeRadius(d));

      const labelJoin = labelLayer.selectAll('text').data(graph.nodes, (d) => d.id);
      labelJoin.exit().remove();
      labelJoin.enter()
        .append('text')
        .attr('font-family', '"Helvetica Neue", Helvetica, Arial, sans-serif')
        .attr('text-anchor', 'middle')
        .attr('dominant-baseline', 'central')
        .style('pointer-events', 'none')
        .merge(labelJoin)
        .text((d) => d.label);

      svg.on('click', () => {
        state.hoveredNodeId = null;
        hideTooltip();
        updateGraphStyles();
      });

      updateGraphStyles(activePathEdges);
    }

    function updateGraphStyles(activePathEdges = new Set(pathEdgeKeys(state.pathNodes))) {
      const immediateIds = new Set(currentImmediateNodeIds());
      const hoverIds = new Set(hoverImmediateNodeIds());
      const graphSize = state.currentGraph.nodes.length;

      linkLayer.selectAll('line')
        .attr('stroke', (d) => d.synthetic ? css('--signal') : factTypeColor(d.factType))
        .attr('stroke-opacity', (d) => {
          const sourceId = d.source.id || d.source;
          const targetId = d.target.id || d.target;
          if (activePathEdges.has(edgeKey(sourceId, targetId))) {
            return 0.96;
          }
          if (state.hoveredNodeId) {
            return hoverIds.has(sourceId) && hoverIds.has(targetId) ? 0.82 : 0.08;
          }
          if (immediateIds.size) {
            return immediateIds.has(sourceId) && immediateIds.has(targetId) ? 0.74 : 0.15;
          }
          return 0.34;
        })
        .attr('stroke-width', (d) => {
          const sourceId = d.source.id || d.source;
          const targetId = d.target.id || d.target;
          if (activePathEdges.has(edgeKey(sourceId, targetId))) {
            return 2.8;
          }
          return d.synthetic ? 2.2 : d.factType === 'phonological' ? 1.8 : 1.3;
        })
        .attr('stroke-dasharray', (d) => d.synthetic ? '8,6' : d.factType === 'phonological' ? '5,3' : null);

      nodeLayer.selectAll('circle')
        .attr('fill', (d) => nodeFill(d))
        .attr('stroke', (d) => nodeStroke(d))
        .attr('stroke-width', (d) => nodeStrokeWidth(d))
        .attr('opacity', (d) => {
          if (state.hoveredNodeId) {
            return hoverIds.has(d.id) ? 1 : 0.18;
          }
          if (immediateIds.size) {
            return immediateIds.has(d.id) ? 1 : 0.26;
          }
          return 1;
        });

      labelLayer.selectAll('text')
        .attr('font-size', (d) => labelSize(d))
        .attr('font-weight', (d) => importantLabel(d) ? 700 : 300)
        .attr('fill', (d) => d.id === state.selectedNodeId ? '#111111' : d.id === state.hoveredNodeId ? css('--signal') : css('--ink'))
        .style('display', (d) => showLabel(d, graphSize) ? null : 'none')
        .style('opacity', (d) => {
          if (state.hoveredNodeId) {
            return hoverIds.has(d.id) ? 1 : 0.2;
          }
          if (immediateIds.size) {
            return immediateIds.has(d.id) ? 1 : 0.3;
          }
          return 1;
        });
    }

    function ticked() {
      linkLayer.selectAll('line')
        .attr('x1', (d) => d.source.x)
        .attr('y1', (d) => d.source.y)
        .attr('x2', (d) => d.target.x)
        .attr('y2', (d) => d.target.y);

      nodeLayer.selectAll('circle')
        .attr('cx', (d) => d.x)

      labelLayer.selectAll('text')
        .attr('x', (d) => d.x)

      if (state.layout === 'grouped' && state.currentGroupCircles) {

          const sn = state.currentGroupCircles.get(d[0]);
          if (!sn || !sn.members.length) return;
          d3.select(this).attr('cx', sn.x).attr('cy', sn.y).attr('r', sn.r);
        });
        guideLayer.selectAll('text.guide-label').each(function (d) {
          const sn = state.currentGroupCircles.get(d[0]);
          if (!sn || !sn.members.length) return;
