    function currentImmediateNodeIds() {
      if (!state.selectedNodeId) {
        return [];
      }
      return [state.selectedNodeId, ...immediateFactsForNode(state.selectedNodeId)];
    }

    function hoverImmediateNodeIds() {
      if (!state.hoveredNodeId) {
        return [];
      }
      return [state.hoveredNodeId, ...immediateFactsForNode(state.hoveredNodeId)];
    }

    function immediateFactsForNode(nodeId) {
      const node = allGraphNodes().get(nodeId);
      if (!node) {
        return [];
      }
      if (node.isSign) {
        return (state.data.factsBySign.get(nodeId) || [])
          .filter((fact) => state.filters.factTypes.has(fact.factType))
          .filter((fact) => shouldShowInGraph(fact))
          .map((fact) => fact.objectId);
      }
      return (state.data.factsByNode.get(nodeId) || []).map((fact) => fact.subjectId);
    }

    function setSelectedNode(nodeId, options = {}) {
      if (nodeId !== state.selectedNodeId) {
        state.selectedFactType = null;
      }
      state.selectedNodeId = nodeId;
      if (options.clearPath !== false) {
        state.pathNodes = [];
      }
      updateControls();
      refreshGraph({ refit: Boolean(options.refit) });
    }

    function renderWeightSliders(container, weights, onChange) {
      if (!container) return;
      container.innerHTML = SIMILARITY_TYPES.map((type) => {
        const val = Math.round((weights[type] || 0) * 10);
        const color = COLORS[type] || '#888';
        return `
          <div class="slider-row">
            <span class="slider-label" style="color:${color}">${type}</span>
            <input type="range" min="0" max="10" step="1" value="${val}"
                   class="similarity-slider" data-sim-type="${escapeHtml(type)}"
                   style="accent-color:${color}">
            <span class="slider-value">${val}</span>
          </div>
        `;
      }).join('');
      container.querySelectorAll('[data-sim-type]').forEach((input) => {
        input.addEventListener('input', () => {
          weights[input.dataset.simType] = Number(input.value) / 10;
          input.nextElementSibling.textContent = input.value;
          onChange();
        });
      });
    }


    function renderRelated() {
      // List is not shown; the sliders drive the overlay visualization directly.
      updateRelatedOverlay();
    }

    function getSimilarSigns(signId, types, limit) {
      if (!signId || !types.length) {
        return [];
      }
      const cacheKey = `${signId}|${types.slice().sort().join('+')}`;
      if (state.data.similarityCache.has(cacheKey)) {
        return state.data.similarityCache.get(cacheKey).slice(0, limit);
      }

      const candidateIds = similarityCandidates(signId, types);
      const results = [];
      candidateIds.forEach((otherId) => {
        if (otherId === signId || BLOCKED_PATH_LABELS.has(normalize(state.data.nodeMap.get(otherId).label))) {
          return;
        }
        const score = similarityScore(signId, otherId, types);
        if (score.score > 0) {
          results.push({
            node: state.data.nodeMap.get(otherId),
            score: score.score,
            explanation: score.explanation
          });
        }
      });

      results.sort((a, b) => d3.descending(a.score, b.score) || a.node.label.localeCompare(b.node.label));
      state.data.similarityCache.set(cacheKey, results);
      return results.slice(0, limit);
    }

    function getSimilarSignsWeighted(signId, weights, limit) {
      const activeTypes = ['phonological', 'semantic'].filter((t) => weights[t] > 0);
      if (!signId || !activeTypes.length) return [];
      const candidateIds = similarityCandidates(signId, activeTypes);
      const results = [];
      candidateIds.forEach((otherId) => {
        if (otherId === signId || BLOCKED_PATH_LABELS.has(normalize(state.data.nodeMap.get(otherId)?.label || ''))) return;
        const score = similarityScoreWeighted(signId, otherId, weights);
        if (score.score > 0) results.push({ node: state.data.nodeMap.get(otherId), score: score.score, explanation: score.explanation });
      });
      results.sort((a, b) => d3.descending(a.score, b.score) || a.node.label.localeCompare(b.node.label));
      return results.slice(0, limit);
    }

    // weights[type] = 0–1 where the value is the MINIMUM proportion of features
    // that must match for this type to contribute (0 = type off, 1.0 = exact match required).
    // Among qualifying signs the actual proportion is used as the score contribution.
    function similarityScoreWeighted(aId, bId, weights) {
      const featuresA = state.data.signFeatureCache.get(aId);
      const featuresB = state.data.signFeatureCache.get(bId);
      if (!featuresA || !featuresB) return { score: 0, explanation: [] };
      let total = 0;
      const allExplanations = [];

      SIMILARITY_TYPES.forEach((type) => {
        const required = weights[type] || 0;
        if (required <= 0) return; // type is off

        const catA = featuresA.categorical.get(type) || new Set();
        const catB = featuresB.categorical.get(type) || new Set();
        const numA = featuresA.numeric.get(type) || new Map();
        const numB = featuresB.numeric.get(type) || new Map();
        const totalA = catA.size + numA.size;
        if (totalA === 0) return;

        let matched = 0;

        catA.forEach((featureKey) => {
          if (catB.has(featureKey)) {
            matched += 1;
            const [rel, val] = featureKey.split('::');
            allExplanations.push({ score: 1, text: `${rel} = ${val}` });
          }
        });

        numA.forEach((valueA, relation) => {
          if (!numB.has(relation)) return;
          const valueB = numB.get(relation);
          const range = state.data.numericRanges.get(`${type}|${relation}`);
          if (!range) return;
          const w = range.max - range.min;
          const sim = w === 0 ? 1 : Math.max(0, 1 - Math.abs(valueA - valueB) / w);
          if (sim > 0.75) {
            matched += sim;
            allExplanations.push({ score: sim, text: `${relation} ≈ ${valueA}` });
          }
        });

        const actualProp = matched / totalA;
        if (actualProp < required) return; // below threshold — doesn't qualify
        total += actualProp;
      });

      const degreePenalty = 1 + Math.abs((state.data.nodeMap.get(aId)?.outgoingFacts || 0) - (state.data.nodeMap.get(bId)?.outgoingFacts || 0)) / 120;
      const explanation = allExplanations.sort((a, b) => d3.descending(a.score, b.score)).slice(0, 3).map((e) => e.text);
      return { score: total / degreePenalty, explanation };
    }

    function updateRelatedOverlayAndRender() {
      updateRelatedOverlay();
      renderPathPanel();
    }

    function updateRelatedOverlay() {
      const sign = selectedSign();
      if (!sign || state.nodeTab !== 'related') {
        if (state.relatedOverlay.length > 0) {
          state.relatedOverlay = [];
          refreshGraph({ preservePositions: true, softRestart: true });
        }
        return;
      }
      const topRelated = getSimilarSignsWeighted(sign.id, state.similarity, 8);
      const newOverlay = topRelated.map((e) => e.node.id);
      const changed = newOverlay.join(',') !== (state.relatedOverlay || []).join(',');
      state.relatedOverlay = newOverlay;
      if (changed) {
        refreshGraph({ preservePositions: true, softRestart: true });
      }
    }

    function similarityCandidates(signId, types) {
      const features = state.data.signFeatureCache.get(signId);
      const candidates = new Set();

      types.forEach((type) => {
        const categorical = features.categorical.get(type) || new Set();
        const numerical = features.numeric.get(type) || new Map();
        categorical.forEach((featureKey) => {
          (state.data.categoricalIndex.get(type)?.get(featureKey) || []).forEach((candidateId) => candidates.add(candidateId));
        });
        numerical.forEach((_, relationKey) => {
          (state.data.numericRelationIndex.get(type)?.get(relationKey) || []).forEach((candidateId) => candidates.add(candidateId));
        });
      });

      candidates.delete(signId);

      if (candidates.size < 80) {
        state.data.topDegreeSigns.slice(0, 160).forEach((node) => candidates.add(node.id));
      }

      return Array.from(candidates)
        .sort((a, b) => d3.descending(state.data.nodeMap.get(a)?.outgoingFacts || 0, state.data.nodeMap.get(b)?.outgoingFacts || 0))
        .slice(0, 900);
    }

    function similarityScore(aId, bId, types) {
      const featuresA = state.data.signFeatureCache.get(aId);
      const featuresB = state.data.signFeatureCache.get(bId);
      let categoricalScore = 0;
      let numericScore = 0;
      const explanations = [];

      types.forEach((type) => {
        const catA = featuresA.categorical.get(type) || new Set();
        const catB = featuresB.categorical.get(type) || new Set();
        catA.forEach((featureKey) => {
          if (catB.has(featureKey)) {
            const rarity = state.data.featureFrequency.get(featureKey) || 1;
            const weight = 1 / Math.sqrt(rarity);
            categoricalScore += weight * 2.4;
            explanations.push({ score: weight * 2.4, text: featureKey.replace('::', ' = '), type });
          }
        });

        const numA = featuresA.numeric.get(type) || new Map();
        const numB = featuresB.numeric.get(type) || new Map();
        numA.forEach((valueA, relation) => {
          if (!numB.has(relation)) {
            return;
          }
          const valueB = numB.get(relation);
          const range = state.data.numericRanges.get(`${type}|${relation}`);
          if (!range) {
            return;
          }
          const width = range.max - range.min;
          if (width === 0) {
            numericScore += 1.2;
            explanations.push({ score: 1.2, text: `${relation} ≈ ${valueA}`, type });
            return;
          }
          const sim = Math.max(0, 1 - Math.abs(valueA - valueB) / width);
          if (sim > 0.75) {
            const weight = sim * 1.4;
            numericScore += weight;
            explanations.push({ score: weight, text: `${relation} ≈ ${trimNumber(valueA)}/${trimNumber(valueB)}`, type });
          }
        });
      });

      const degreePenalty = 1 + Math.abs((state.data.nodeMap.get(aId).outgoingFacts || 0) - (state.data.nodeMap.get(bId).outgoingFacts || 0)) / 120;
      const total = (categoricalScore + numericScore) / degreePenalty;
      const explanation = explanations
        .sort((a, b) => d3.descending(a.score, b.score))
        .slice(0, 3)
        .map((entry) => entry.text);

      return { score: total, explanation };
    }

    function sharedFeatures(aId, bId, types) {
      const featuresA = state.data.signFeatureCache.get(aId);
      const featuresB = state.data.signFeatureCache.get(bId);
      const shared = [];

      types.forEach((type) => {
        const catA = featuresA.categorical.get(type) || new Set();
        const catB = featuresB.categorical.get(type) || new Set();
        catA.forEach((featureKey) => {
          if (!catB.has(featureKey)) {
            return;
          }
          const rarity = state.data.featureFrequency.get(featureKey) || 1;
          const score = 1 / Math.sqrt(rarity);
          const [relation, value] = featureKey.split('::');
          shared.push({
            key: featureKey,
            label: `${relation}: ${value}`,
            relation,
            type,
            score
          });
        });

        // Only include binary numeric features (value=1 means "true" for a 0/1 relation).
        const numA = featuresA.numeric.get(type) || new Map();
        const numB = featuresB.numeric.get(type) || new Map();
        numA.forEach((valueA, relation) => {
          if (!numB.has(relation)) return;
          const range = state.data.numericRanges.get(`${type}|${relation}`);
          const isBinary = range && (range.min === 0 || range.min === 1) && (range.max === 0 || range.max === 1);
          if (!isBinary) return;
          const valueB = numB.get(relation);
          if (valueA === 1 && valueB === 1) {
            shared.push({ key: `${relation}:bin`, label: relation, relation, type, score: 1 });
          }
        });
      });

      return shared.sort((a, b) => d3.descending(a.score, b.score));
    }

    function renderPathPanel() {
      const startSign = state.pathStartId ? state.data.nodeMap.get(state.pathStartId) : null;
      els.pathStartPill.innerHTML = startSign ? `<span class="pill active">${escapeHtml(startSign.label)}</span>` : '';
      els.pathEndPill.innerHTML = '';
      els.pathMeta.textContent = state.pathNodes.length ? `${state.pathNodes.length - 1} hops` : '';
      if (!state.pathNodes.length) {
        els.pathList.innerHTML = '<div class="micro" style="padding:12px;">Enter a start and end sign.</div>';
        return;
      }

      const pathActiveTypes = SIMILARITY_TYPES.filter((t) => (state.similarity[t] || 0) > 0);
      els.pathList.innerHTML = state.pathNodes.map((nodeId, index) => {
        const node = state.data.nodeMap.get(nodeId);
        const hopExplanation = index < state.pathNodes.length - 1
          ? sharedFeatures(nodeId, state.pathNodes[index + 1], pathActiveTypes).slice(0, 3).map((item) => item.label).join(' · ')
          : '';
        return `
          <button class="list-row" type="button" data-path-node="${escapeHtml(nodeId)}">
            <span class="row-title">${index + 1}. ${escapeHtml(node.label)}</span>
            <span class="row-meta">${hopExplanation ? escapeHtml(hopExplanation) : ''}</span>
          </button>
        `;
      }).join('');

      els.pathList.querySelectorAll('[data-path-node]').forEach((button) => {
        button.addEventListener('click', () => setSelectedNode(button.dataset.pathNode, { refit: true, clearPath: false }));
      });
    }

    function findPath() {
      const q = els.pathStartInput.value.trim().toLowerCase();
      const start = q ? state.data.signNodes.find((n) => n.label.toLowerCase() === q || n.label.toLowerCase().startsWith(q) || n.id.toLowerCase() === q) : null;
      if (!start) {
        setStatus('Enter a valid start sign.', true);
        return;
      }
      state.pathStartId = start.id;

      const target = state.data.signNodes.find((node) => {
        const q = els.pathTargetInput.value.trim().toLowerCase();
        return q && (node.label.toLowerCase() === q || node.label.toLowerCase().includes(q) || node.id.toLowerCase() === q);
      });

      if (!target || BLOCKED_PATH_LABELS.has(normalize(target.label))) {
        setStatus('No valid end sign matched the query.', true);
        return;
      }

      const path = informativePath(start.id, target.id, state.similarity);
      if (!path.length) {
        state.pathNodes = [];
        renderPathPanel();
        refreshGraph({ refit: true });
        setStatus(`No informative path found from ${start.label} to ${target.label}.`, true);
        return;
      }

      state.pathNodes = path;
      state.mode = 'focus';
      updateControls();
      refreshGraph({ refit: true });
      setStatus(`Path length ${path.length - 1} from ${start.label} to ${target.label}.`);
    }

    function informativePath(startId, targetId, types) {
      const activeWeights = state.similarity;
      const hasActive = SIMILARITY_TYPES.some((t) => (activeWeights[t] || 0) > 0);
      if (!hasActive || BLOCKED_PATH_LABELS.has(normalize(state.data.nodeMap.get(targetId)?.label))) {
        return [];
      }
      if (startId === targetId) {
        return [startId];
      }

      const distances = new Map([[startId, 0]]);
      const previous = new Map([[startId, null]]);
      const frontier = [{ id: startId, cost: 0 }];
      const visited = new Set();
      let expansions = 0;

      while (frontier.length) {
        frontier.sort((a, b) => a.cost - b.cost);
        const current = frontier.shift();
        if (visited.has(current.id)) {
          continue;
        }
        visited.add(current.id);
        expansions += 1;
        if (expansions > 160) {
          break;
        }
        if (current.id === targetId) {
          break;
        }

        const neighbors = getSimilarSignsWeighted(current.id, activeWeights, 20);
        neighbors.forEach((entry) => {
          const neighborId = entry.node.id;
          if (BLOCKED_PATH_LABELS.has(normalize(entry.node.label))) {
            return;
          }
          const cost = 0.95 + 1 / (1 + entry.score);
          const nextCost = current.cost + cost;
          if (!distances.has(neighborId) || nextCost < distances.get(neighborId)) {
            distances.set(neighborId, nextCost);
            previous.set(neighborId, current.id);
            frontier.push({ id: neighborId, cost: nextCost });
          }
        });
      }

      if (!previous.has(targetId)) {
        const direct = similarityScoreWeighted(startId, targetId, activeWeights);
        return direct.score > 0 ? [startId, targetId] : [];
      }

      const path = [targetId];
      let cursor = previous.get(targetId);
      while (cursor !== null) {
        path.push(cursor);
        cursor = previous.get(cursor);
      }
      return path.reverse();
    }

    function clearPath(shouldRefresh) {
      state.pathNodes = [];
      state.pathStartId = null;
      if (els.pathStartInput) els.pathStartInput.value = '';
      els.pathTargetInput.value = '';
      renderPathPanel();
      if (shouldRefresh) {
        refreshGraph({ refit: true });
      }
    }

    function renderFactsTab() {
      const node = currentNode();
      renderCurrentFacts(node);
      renderDisplayedGraphInfo();
      renderEntireGraphInfo();
    }

    function renderCurrentFacts(node) {
      if (!node) {
        els.currentNodeMeta.textContent = '0';
        els.currentFactsTable.innerHTML = '<div class="micro" style="padding:12px;">Select a node.</div>';
        return;
      }

      const facts = node.isSign
        ? (state.data.factsBySign.get(node.id) || []).filter((fact) => state.filters.factTypes.has(fact.factType)).slice(0, 200)
        : (state.data.factsByNode.get(node.id) || []).slice(0, 200);

      els.currentNodeMeta.textContent = `${facts.length}`;
      if (!facts.length) {
        els.currentFactsTable.innerHTML = '<div class="micro" style="padding:12px;">No facts.</div>';
        return;
      }

      els.currentFactsTable.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>${node.isSign ? 'Relation' : 'Sign'}</th>
              <th>${node.isSign ? 'Value' : 'Relation'}</th>
              <th>Type</th>
            </tr>
          </thead>
          <tbody>
            ${facts.map((fact) => `
              <tr>
                <td>${escapeHtml(node.isSign ? fact.relation : state.data.nodeMap.get(fact.subjectId)?.label || fact.subjectId)}</td>
                <td>${escapeHtml(node.isSign ? fact.objectLabel : fact.relation)}</td>
                <td>${escapeHtml(fact.factType)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function renderDisplayedGraphInfo() {
      const graph = state.currentGraph;
      const signCount = graph.nodes.filter((node) => node.isSign).length;
      const propertyCount = graph.nodes.filter((node) => !node.isSign).length;
      els.displayedGraphMeta.textContent = `${graph.nodes.length} nodes`;
      renderBarBlock(els.displayedGraphInfo, [
        { label: 'sign nodes', value: signCount, color: COLORS.sign },
        { label: 'property nodes', value: propertyCount, color: COLORS.other },
        { label: 'fact links', value: graph.links.length, color: COLORS.semantic },
        { label: 'path links', value: (graph.syntheticLinks || []).length, color: css('--signal') }
      ]);
    }

    function renderEntireGraphInfo() {
      els.entireGraphMeta.textContent = `${formatNumber(state.data.graphStats.facts)} facts`;
      renderBarBlock(els.entireGraphInfo, [
        { label: 'sign nodes', value: state.data.graphStats.signs, color: COLORS.sign },
        { label: 'property nodes', value: state.data.graphStats.properties, color: COLORS.other },
        { label: 'relations', value: state.data.graphStats.relations, color: COLORS.systematicity },
        { label: 'facts', value: state.data.graphStats.facts, color: COLORS.semantic }
      ]);
    }

    function renderBarBlock(container, items) {
      const max = d3.max(items, (item) => item.value) || 1;
      container.innerHTML = `
        <div class="bar-list">
          ${items.map((item) => `
            <div class="bar-row">
              <div class="bar-meta">
                <span>${escapeHtml(item.label)}</span>
                <span>${formatNumber(item.value)}</span>
              </div>
              <div class="track"><div class="fill" style="width:${Math.max(4, item.value / max * 100)}%; background:${item.color};"></div></div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function currentNode() {
      return allGraphNodes().get(state.selectedNodeId) || null;
    }

    function selectedSign() {
      const node = state.data.nodeMap.get(state.selectedNodeId);
      return node && node.isSign ? node : null;
    }

    function allGraphNodes() {
      const map = new Map();
      state.data.nodeMap.forEach((node, id) => map.set(id, node));
      state.data.factNodeIndex.forEach((node, id) => map.set(id, node));
      return map;
    }

    function nodeFill(node) {
      if (node.id === state.selectedNodeId) {
        return css('--signal');
      }
      return nodeColor(node);
    }

    function nodeColor(node) {
      if (node.isSign) {
        return COLORS.sign;
      }
      return factTypeColor(node.kind || node.factType || 'other');
    }

    function nodeStroke(node) {
      if (node.id === state.selectedNodeId) {
        return '#ffffff';
      }
      if (node.id === state.hoveredNodeId) {
        return css('--signal');
      }
      return 'rgba(17, 17, 17, 0.18)';
    }

    function nodeStrokeWidth(node) {
      if (node.id === state.selectedNodeId) {
        return 3;
      }
      if (node.id === state.hoveredNodeId) {
        return 2.2;
      }
      return 1.1;
    }

    function nodeRadius(node) {
      if (node.isSign) {
        return Math.max(8, Math.min(20, 8 + Math.sqrt(node.degree || 0) * 0.65));
      }
      return Math.max(5, Math.min(14, 5 + Math.sqrt(node.degree || 0) * 0.45));
    }

    function labelSize(node) {
      return node.isSign ? 12 : 10;
    }

    function importantLabel(node) {
      return node.id === state.selectedNodeId || node.id === state.hoveredNodeId || node.isSign || node.bridge;
    }

    function showLabel(node, graphSize) {
      return graphSize < 90 || importantLabel(node);
    }

    function factTypeColor(factType) {
      return COLORS[factType] || COLORS.other;
    }

    function dominantKind(types) {
      if (types.includes('phonological')) {
        return 'phonological';
      }
      if (types.includes('semantic')) {
        return 'semantic';
      }
      if (types.includes('syntactic')) {
        return 'syntactic';
      }
      if (types.includes('systematicity')) {
        return 'systematicity';
      }
      if (types.includes('cognitive')) {
        return 'cognitive';
      }
      return 'other';
    }

    function tooltipHtml(node) {
      return `
        <strong>${escapeHtml(node.label)}</strong><br>
        ${escapeHtml(node.isSign ? 'sign' : `${node.kind} property`)}<br>
        ${escapeHtml(node.id)}<br>
        degree ${formatNumber(node.degree || 0)}
      `;
    }

    function dragStarted(event, node) {
      if (!event.active && !state.frozen) {
        simulation.alphaTarget(0.18).restart();
      }
      node.fx = node.x;
      node.fy = node.y;
    }

    function dragged(event, node) {
      node.fx = event.x;
      node.fy = event.y;
    }

    function dragEnded(event, node) {
      if (!event.active && !state.frozen) {
        simulation.alphaTarget(0);
      }
      node.fx = event.x;
      node.fy = event.y;
    }

    function fitGraph() {
      const nodes = state.currentGraph.nodes;
      if (!nodes.length) {
        return;
      }
      const xExtent = d3.extent(nodes, (node) => node.x || 0);
      const yExtent = d3.extent(nodes, (node) => node.y || 0);
      const width = els.graph.clientWidth || window.innerWidth;
      const height = els.graph.clientHeight || window.innerHeight;
      const dx = (xExtent[1] - xExtent[0]) || 1;
      const dy = (yExtent[1] - yExtent[0]) || 1;
      const centerX = (xExtent[0] + xExtent[1]) / 2;
      const centerY = (yExtent[0] + yExtent[1]) / 2;
      const scale = Math.max(0.22, Math.min(2.1, 0.9 / Math.max(dx / width, dy / height)));
      const transform = d3.zoomIdentity.translate(width / 2, height / 2).scale(scale).translate(-centerX, -centerY);
      svg.transition().duration(420).call(zoomBehavior.transform, transform);
    }

    function showTooltip(event, html) {
      els.tooltip.innerHTML = html;
      els.tooltip.style.opacity = '1';
      els.tooltip.style.left = `${event.offsetX + 12}px`;
      els.tooltip.style.top = `${event.offsetY + 12}px`;
    }

    function hideTooltip() {
      els.tooltip.style.opacity = '0';
    }

    function setStatus(message, warn = false) {
      els.status.textContent = message;
      els.status.style.color = warn ? css('--danger') : css('--ink');
      els.status.style.borderColor = warn ? 'rgba(195, 90, 49, 0.28)' : css('--line');
    }

    function dedupeNodes(nodes) {
      const map = new Map();
      nodes.forEach((node) => {
        if (!map.has(node.id)) {
          map.set(node.id, node);
        }
      });
      return Array.from(map.values());
    }

    function summaryCard(value, label) {
      return `<div class="summary-card"><strong>${formatNumber(value)}</strong><span>${escapeHtml(label)}</span></div>`;
    }

    function topEntries(map, limit) {
      return Array.from(map.entries()).sort((a, b) => d3.descending(a[1], b[1]) || a[0].localeCompare(b[0])).slice(0, limit);
    }

    function matchScore(node, query) {
      const label = node.label.toLowerCase();
      const id = node.id.toLowerCase();
      if (label === query || id === query) {
        return 12;
      }
      if (label.startsWith(query)) {
        return 8;
      }
      if (id.startsWith(query)) {
        return 7;
      }
      return (label.includes(query) ? 4 : 0) + (id.includes(query) ? 3 : 0);
    }

    function trimNumber(value) {
      return Number(value).toFixed(2).replace(/\.00$/, '').replace(/(\.\d)0$/, '$1');
    }

    function normalize(value) {
      return String(value || '').trim().toLowerCase();
    }

    function edgeKey(a, b) {
      return [a, b].sort().join('|');
    }

    function pathEdgeKeys(path) {
      const keys = [];
      for (let index = 0; index < path.length - 1; index += 1) {
        keys.push(edgeKey(path[index], path[index + 1]));
      }
      return keys;
    }

    function linkDistance(link) {
      if (link.synthetic) {
        return 92;
      }
      if (link.factType === 'phonological') {
        return 58;
      }
      if (link.factType === 'semantic') {
        return 72;
      }
      return 82;
    }

    function typeSort(a, b) {
      const order = ['translation', 'semantic', 'syntactic', 'systematicity', 'phonological', 'cognitive', 'other'];
      return order.indexOf(a) - order.indexOf(b) || a.localeCompare(b);
    }

    function toggleSet(set, value) {
      if (set.has(value)) {
        set.delete(value);
      } else {
        set.add(value);
      }
    }

    function addToArrayMap(map, key, value) {
      if (!map.has(key)) {
        map.set(key, []);
      }
      map.get(key).push(value);
    }

    function increment(map, key, amount = 1) {
      map.set(key, (map.get(key) || 0) + amount);
    }

    function parseTSV(text) {
      const lines = text.replace(/\ufeff/g, '').trim().split(/\r?\n/);
      if (!lines.length) {
        return [];
      }
      const headers = lines[0].split('\t');
      return lines.slice(1).filter(Boolean).map((line) => {
        const parts = line.split('\t');
        const row = {};
        headers.forEach((header, index) => {
          row[header] = parts[index] ?? '';
        });
        return row;
      });
    }

    function allValues(map) {
      return Array.from(map.values());
    }

    function currentTime() {
      return Date.now();
    }

    function formatNumber(value) {
      if (typeof value === 'number') {
        return new Intl.NumberFormat('en-US').format(value);
      }
      return String(value);
    }

    function css(variable) {
      return getComputedStyle(document.documentElement).getPropertyValue(variable).trim();
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function nextFrame() {
      return new Promise((resolve) => requestAnimationFrame(resolve));
    }
  </script>
</body>
</html>
